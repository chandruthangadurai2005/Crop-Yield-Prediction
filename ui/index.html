<!DOCTYPE html>
<html>
<head>
    <title>Crop Yield Prediction</title>

<style>

   body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1d4350, #a43931);
    margin: 0;
    padding: 40px 0;
    display: flex;
    justify-content: center;
}


    .container {
    margin-top: 20px;
    margin-bottom: 20px;
}


    .header {
        background: rgba(255,255,255,0.08);
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 15px;
    }

    label {
        font-size: 14px;
        font-weight: 500;
        display: block;
        margin-top: 10px;
        text-align: left;
    }

    input, select {
        width: 100%;
        padding: 11px;
        margin-top: 5px;
        border-radius: 10px;
        border: none;
        font-size: 14px;
        background: rgba(255,255,255,0.15);
        color: white;
    }

    button {
        width: 100%;
        margin-top: 18px;
        padding: 12px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, #11998e, #38ef7d);
        color: white;
        font-size: 15px;
        cursor: pointer;
    }

    #result {
        margin-top: 20px;
        padding: 18px;
        border-radius: 14px;
        background: rgba(255,255,255,0.12);
        text-align: left;
        line-height: 1.6;
        max-height: 160px;
        overflow-y: auto;
    }

</style>

</head>

<body>

<div class="container">

    <div class="header">
        <h2>🌾 AI Crop Yield Prediction & Recommendation</h2>
        <p style="opacity:0.75; font-size:13px;">
            Climate • Soil • Input Driven Intelligence
        </p>
    </div>

    <button onclick="getLocation()">📍 Use Current Location</button>
    <h4 id="location"></h4>

    <label>Area:</label>
<select id="area_unit">
    <option value="hectare">Hectares</option>
    <option value="acre">Acres</option>
</select>
<input id="area" type="number">

   

    <label>Annual Rainfall:</label>
    <input id="rainfall" type="number">

    <label>Fertilizer Usage:</label>
<select id="fertilizer_unit">
    <option value="kg">Kilograms (kg)</option>
    <option value="ton">Tonnes</option>
</select>
<input id="fertilizer" type="number">

   

   <label>Pesticide Usage:</label>
<select id="pesticide_unit">
    <option value="litre">Litres (L)</option>
    <option value="ml">Millilitres (ml)</option>
</select>
<input id="pesticide" type="number">


    <label>Crop:</label>
    <select id="crop">
        <option value="Rice">Rice</option>
        <option value="Wheat">Wheat</option>
        <option value="Maize">Maize</option>
    </select>

    <label>State:</label>
    <select id="state">
        <option value="Tamil Nadu">Tamil Nadu</option>
        <option value="Punjab">Punjab</option>
        <option value="Maharashtra">Maharashtra</option>
    </select>

    <button onclick="predictYield()">Predict Yield</button>

    <div id="result"></div>

</div>

<script>

const API_KEY = "cd91daf4edce069dc5fe2e8a9ca6a822";

// Soil Proxy
const soilMap = {
    "Punjab": 0.75,
    "Tamil Nadu": 0.55,
    "Maharashtra": 0.65
};

// =======================
// GPS LOCATION
// =======================

function getLocation() {
    navigator.geolocation.getCurrentPosition(showPosition);
}

function showPosition(position) {

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    fetchClimateData(lat, lon);
    detectState(lat, lon);
}

// =======================
// REVERSE GEOCODING ⭐⭐⭐⭐⭐
// =======================

async function detectState(lat, lon) {

    const response = await fetch(
        `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`
    );

    const data = await response.json();

    const detectedState = data.principalSubdivision;

    const stateDropdown = document.getElementById("state");

    if (![...stateDropdown.options].some(opt => opt.value === detectedState)) {

        const option = document.createElement("option");
        option.value = detectedState;
        option.text = detectedState;

        stateDropdown.appendChild(option);
    }

    stateDropdown.value = detectedState;

    document.getElementById("location").innerText =
        `📍 Location Detected: ${data.city}, ${detectedState}`;
}

// =======================
// WEATHER API
// =======================

async function fetchClimateData(lat, lon) {

    const response = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}`
    );

    const data = await response.json();

    if (data.cod !== 200) {
        document.getElementById("location").innerText =
            "❌ Weather API Error";
        return;
    }

    const humidity = data.main.humidity;
    const clouds = data.clouds.all;

    const rainfall_estimate = (humidity * 0.3 + clouds * 0.2);

    document.getElementById("rainfall").value =
        rainfall_estimate.toFixed(2);
}

// =======================
// PREDICTION
// =======================

async function predictYield() {

    const selectedCrop = document.getElementById("crop").value;
    const selectedState = document.getElementById("state").value;

    const soil_quality_index = soilMap[selectedState] || 0.6;

    // =========================
    // ✅ AREA CONVERSION
    // =========================

    let areaValue = Number(document.getElementById("area").value) || 0;
    const areaUnit = document.getElementById("area_unit").value;

    if (areaUnit === "acre") {
        areaValue *= 0.4047;   // Acres → Hectares ✅
    }

    // =========================
    // ✅ FERTILIZER CONVERSION
    // =========================

    let fertilizerValue = Number(document.getElementById("fertilizer").value) || 0;
    const fertilizerUnit = document.getElementById("fertilizer_unit").value;

    if (fertilizerUnit === "ton") {
        fertilizerValue *= 1000;   // Tonnes → kg ✅
    }

    // =========================
    // ✅ PESTICIDE CONVERSION
    // =========================

    let pesticideValue = Number(document.getElementById("pesticide").value) || 0;
    const pesticideUnit = document.getElementById("pesticide_unit").value;

    if (pesticideUnit === "ml") {
        pesticideValue /= 1000;   // ml → Litres ✅
    }

    // =========================
    // ✅ PAYLOAD (STANDARDIZED)
    // =========================

    const payload = {
        area: areaValue,
        annual_rainfall: Number(document.getElementById("rainfall").value) || 0,
        fertilizer: fertilizerValue,
        pesticide: pesticideValue,
        soil_quality_index,
        selected_crop: selectedCrop
    };

    const response = await fetch("http://127.0.0.1:5001/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    const result = await response.json();

    document.getElementById("result").innerHTML =
        `Predicted Yield: ${result.predicted_yield.toFixed(3)}<br><br>
         ⭐ Recommended Crop: ${result.recommended_crop}<br>
         🌦 Detected Season: ${result.detected_season}<br><br>
         ${result.recommendations.join("<br>")}`;
}


</script>

</body>
</html>
